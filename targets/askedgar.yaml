  - { label: "Ownership",                                 slug: "ownership_v1_ownership_get" }
  - { label: "Research Reports",                          slug: "research_reports_v1_research_reports_get" }
  - { label: "Research Reports — Short",                  slug: "research_reports_short_v1_research_reports_short_get" }
